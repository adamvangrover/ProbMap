<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Dashboard - Risk Intelligence</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: grid;
            grid-template-rows: auto 1fr;
            height: 100vh;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1f2833;
            padding-bottom: 10px;
        }

        h1 { margin: 0; color: #66fcf1; }

        button {
            background-color: #1f2833;
            color: #66fcf1;
            border: 1px solid #66fcf1;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #66fcf1;
            color: #0b0c10;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            height: 100%;
            overflow: hidden;
        }

        .panel {
            background-color: #1f2833;
            border: 1px solid #45a29e;
            border-radius: 4px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel h2 {
            margin-top: 0;
            color: #45a29e;
            font-size: 1.2em;
            border-bottom: 1px solid #45a29e;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        #visual-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
        }

        #visual-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #log-container {
            flex-grow: 1;
            overflow-y: auto;
            background-color: #000;
            padding: 10px;
            font-size: 0.9em;
            line-height: 1.4;
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
        .log-time { color: #888; font-size: 0.8em; margin-right: 10px; }
        .log-agent { color: #f1c40f; font-weight: bold; margin-right: 5px; }
        .log-msg { color: #ecf0f1; }
        .log-info { color: #3498db; }
        .log-warn { color: #e67e22; }

        .status-bar {
            grid-column: 1 / -1;
            padding: 10px;
            background-color: #1f2833;
            color: #aaa;
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Agent Dashboard</h1>
            <span style="font-size: 0.8em; color: #45a29e;">HNASP Protocol Active | Version 1.0.4</span>
        </div>
        <div>
            <a href="index.html" style="color: #66fcf1; text-decoration: none; margin-right: 20px;">&larr; Home</a>
            <button onclick="runSimulation()">Run Simulation</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="panel">
            <h2>Risk Trajectory Visualization</h2>
            <div id="visual-container">
                <p style="color: #666;">Waiting for simulation output...</p>
                <!-- Image will be injected here -->
                <img id="risk-plot" src="" style="display:none;" alt="Risk Trajectory Plot">
            </div>
        </div>

        <div class="panel">
            <h2>Agent Event Log</h2>
            <div id="log-container">
                <div class="log-entry"><span class="log-time">SYSTEM</span> <span class="log-msg">Dashboard initialized. Waiting for command.</span></div>
            </div>
        </div>

        <div class="status-bar">
            <span>Agents Online: PortfolioManager, RiskAnalyst(s), Forecaster, MarketAgent</span>
            <span id="last-update">Last Update: Never</span>
        </div>
    </div>

    <script>
        function log(agent, message, type='info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();

            let typeClass = 'log-msg';
            if (type === 'info') typeClass = 'log-info';
            if (type === 'warn') typeClass = 'log-warn';

            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-agent">${agent}:</span> <span class="${typeClass}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }

        function runSimulation() {
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerText = "Running...";

            log('SYSTEM', 'Initializing Simulation Sequence...', 'warn');

            // Mocking the backend process for the demo
            setTimeout(() => { log('MarketAgent', 'Broadcasting event: COMP001 positive_earnings (HIGH)', 'info'); }, 500);
            setTimeout(() => { log('PortfolioManager', 'Routing event to risk_analyst_COMP001', 'info'); }, 800);
            setTimeout(() => { log('RiskAnalyst', 'Processing evidence. Updating Bayesian Belief...', 'info'); }, 1200);
            setTimeout(() => { log('MarketAgent', 'Broadcasting event: COMP002 lawsuit (MEDIUM)', 'info'); }, 2000);
            setTimeout(() => { log('RiskAnalyst', 'PD Updated for COMP001: 0.012 -> 0.008', 'warn'); }, 2500);
            setTimeout(() => { log('PortfolioManager', 'Risk Map Updated. Generating Trajectory Plot...', 'info'); }, 3000);

            setTimeout(() => {
                // In a real app, this would re-fetch the image generated by the backend
                // Here we simulate it by showing the image if it exists (relative path from showcase/)
                // Assuming the backend saved it to ../output/risk_trajectory.png

                const img = document.getElementById('risk-plot');
                // Use a timestamp to bust cache
                img.src = "../output/risk_trajectory.png?t=" + new Date().getTime();
                img.style.display = 'block';
                img.parentElement.querySelector('p').style.display = 'none';

                log('SYSTEM', 'Simulation Complete. Visualization Updated.', 'warn');
                document.getElementById('last-update').innerText = "Last Update: " + new Date().toLocaleString();

                btn.disabled = false;
                btn.innerText = "Run Simulation";
            }, 3500);
        }

        // Check if image exists on load
        window.onload = function() {
             const img = document.getElementById('risk-plot');
             // Try to load existing image
             img.src = "../output/risk_trajectory.png";
             img.onload = function() {
                 img.style.display = 'block';
                 document.querySelector('#visual-container p').style.display = 'none';
             };
             img.onerror = function() {
                 console.log("No existing plot found.");
             };
        }
    </script>
</body>
</html>
